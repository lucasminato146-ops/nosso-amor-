<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nossa História ❤️</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* FUNDO ROMÂNTICO */
    body {
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    /* CABEÇALHO */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
    }

    /* MENU */
    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffe6e6;
    }

    /* CONTEÚDO */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* CARD CENTRAL */
    .home {
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .home h2 {
      font-family: 'Playfair Display', serif;
      font-size: 50px;
      margin-bottom: 20px;
    }

    .frase {
      font-style: italic;
      margin-bottom: 15px;
    }

    /* BOTÃO */
    .botao {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff4b5c;
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }

    .botao:hover {
      background: #ff1e3c;
      transform: scale(1.05);
    }

    /* RODAPÉ */
    footer {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.2);
    }
  </style>

</head>

<body>

  <!-- CABEÇALHO -->
  <header>
    <h1>❤️ Nós dois</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="sobre.html">Sobre</a>
    </nav>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main>

    <section class="home">
      <h2>Nossa História</h2>

      <p class="frase">
        "De todas as coincidências do mundo, você foi a mais bonita."
      </p>

      <p>
        Esse espaço é só nosso… um lugar onde cada lembrança vira eterna.
      </p>

      <p>
        Cada momento ao seu lado virou parte da minha história favorita ❤️
      </p>

      <a href="galeria.html" class="botao">Ver Galeria</a>
    </section>

  </main>

  <!-- RODAPÉ -->
  <footer>
    <p>Feito com ❤️ por nós dois</p>
  </footer>

</body>
</html>
