<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nossa História ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #fff;
    }

    /* CABEÇALHO NO TOPO (SEM FAIXA) */
    header {
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-bottom: 10px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
    }

    nav a:hover {
      color: #ffe6e6;
    }

    /* CONTEÚDO */
    main {
      padding: 40px 20px;
    }

    .home {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .home h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 20px;
    }


    }

    .frase {
      font-style: italic;
      font-size: 20px;
      color: #fff0f0;
    }
    }
    }
footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

  </style>
</head>

<body>

  <!-- TOPO -->
  <header>
    <h1>❤️ Nós dois</h1>

    <section class="home">
      <h2>meu amor por voce</h2>

      <p class="frase">
        "De todas as coincidências do mundo, você foi a mais bonita."
      </p>

      <p>
        Esse espaço é só nosso… um lugar onde cada lembrança vira eterna.
      </p>

      <p>
        Cada momento ao seu lado virou parte da minha história favorita ❤️
      </p>

      <a href="galeria.html" class="botao"></a>
    </section>

  </main>

  <!-- RODAPÉ -->
  <footer>
    <p>Feito com amor por nós dois❤️ </p>
  </footer>

</body>
</html>
