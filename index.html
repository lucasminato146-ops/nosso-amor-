<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 30px 20px;
    }

    /* TÍTULO COM FAIXA */
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-bottom: 10px;

      background: rgba(0, 0, 0, 0.3);
      display: inline-block;
      padding: 10px 25px;
      border-radius: 20px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
    }

    nav a:hover {
      color: #ffe6e6;
    }

    main {
      padding: 40px 20px;
    }

    .home {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .home h2 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-bottom: 20px;
      text-align: center;
    }

    .home p {
      font-size: 24px;
      margin-bottom: 18px;
      line-height: 1.6;
      text-align: center;
    }

    .frase {
      font-style: italic;
      font-size: 26px;
      color: #fff0f0;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 32px;
      }

      .home {
        padding: 22px;
      }

      .home h2 {
        font-size: 30px;
      }

      .home p {
        font-size: 20px;
      }

      .frase {
        font-size: 22px;
      }

      nav a {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>❤️ Nós dois</h1>
  
  </header>

  <main>
    <section class="home">
      <h2>Meu amor por você</h2>

      <p class="frase">
        "De todas as coincidências do mundo, você foi a mais bonita."
      </p>

      <p>
        Esse espaço é só nosso… um lugar onde cada lembrança vira eterna.
      </p>

      <p>
        Cada momento ao seu lado virou parte da minha história favorita ❤️
      </p>
    </section>
  </main>

  <footer>
    <p>Feito com amor por nós dois ❤️</p>
  </footer>

</body>
</html>
